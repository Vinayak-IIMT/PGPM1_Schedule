<style>
/* ── TOKENS ── */
:root {
  --ease: all .2s ease;
}
[data-theme="dark"] {
  --bg:       #09090b;
  --surface:  #18181b;
  --card:     #18181b;
  --border:   #27272a;
  --text:     #fafafa;
  --muted:    #52525b;
  --submuted: #3f3f46;
  --accent:   #7c5cfc;
  --grad1:    #6d28d9;
  --grad2:    #db2777;
  --tag-bg:   rgba(109,40,217,.12);
  --tag-br:   rgba(109,40,217,.3);
  --prereads-top: rgba(109,40,217,.15);
  --prereads-top-br: rgba(109,40,217,.25);
  --prereads-card: rgba(0,0,0,.25);
  --prereads-card-br: rgba(255,255,255,.07);
  --prereads-ref: rgba(255,255,255,.04);
  --tab-active-bg: #18181b;
  --install-bg: #18181b;
  --ob-bg:    #09090b;
  --ob-card:  #18181b;
  --ob-border:#27272a;
}
[data-theme="light"] {
  --bg:       #f5f5f7;
  --surface:  #ffffff;
  --card:     #ffffff;
  --border:   #e5e7eb;
  --text:     #1d1d1f;
  --muted:    #86868b;
  --submuted: #c7c7cc;
  --accent:   #5e5ce6;
  --grad1:    #5e5ce6;
  --grad2:    #d63af9;
  --tag-bg:   rgba(94,92,230,.08);
  --tag-br:   rgba(94,92,230,.2);
  --prereads-top: rgba(94,92,230,.08);
  --prereads-top-br: rgba(94,92,230,.2);
  --prereads-card: rgba(94,92,230,.04);
  --prereads-card-br: rgba(94,92,230,.15);
  --prereads-ref: rgba(0,0,0,.03);
  --tab-active-bg: #f5f5f7;
  --install-bg: #f0f0f5;
  --ob-bg:    #f5f5f7;
  --ob-card:  #ffffff;
  --ob-border:#e5e7eb;
}

/* ── COURSE COLOURS (same both themes, just opacity differs) ── */
[data-theme="dark"]  { --bs-ac:#7c5cfc; --bs-bg:rgba(124,92,252,.13); --bs-br:rgba(124,92,252,.3); }
[data-theme="dark"]  { --fra-ac:#f7567c; --fra-bg:rgba(247,86,124,.13); --fra-br:rgba(247,86,124,.3); }
[data-theme="dark"]  { --me-ac:#ffd166;  --me-bg:rgba(255,209,102,.13); --me-br:rgba(255,209,102,.3); }
[data-theme="dark"]  { --mc-ac:#06d6a0;  --mc-bg:rgba(6,214,160,.13);  --mc-br:rgba(6,214,160,.3); }
[data-theme="dark"]  { --mmi-ac:#38bdf8; --mmi-bg:rgba(56,189,248,.13); --mmi-br:rgba(56,189,248,.3); }
[data-theme="dark"]  { --miob-ac:#ef8c4e; --miob-bg:rgba(239,140,78,.13); --miob-br:rgba(239,140,78,.3); }
[data-theme="light"] { --bs-ac:#5e5ce6; --bs-bg:rgba(94,92,230,.08); --bs-br:rgba(94,92,230,.2); }
[data-theme="light"] { --fra-ac:#e0175d; --fra-bg:rgba(224,23,93,.06); --fra-br:rgba(224,23,93,.18); }
[data-theme="light"] { --me-ac:#b45309;  --me-bg:rgba(180,83,9,.06);  --me-br:rgba(180,83,9,.18); }
[data-theme="light"] { --mc-ac:#059669;  --mc-bg:rgba(5,150,105,.06); --mc-br:rgba(5,150,105,.18); }
[data-theme="light"] { --mmi-ac:#0284c7; --mmi-bg:rgba(2,132,199,.06); --mmi-br:rgba(2,132,199,.18); }
[data-theme="light"] { --miob-ac:#c2410c; --miob-bg:rgba(194,65,12,.06); --miob-br:rgba(194,65,12,.18); }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;transition:background-color .25s,color .2s,border-color .2s}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;max-width:600px;margin:0 auto}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--grad1),var(--grad2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.hdr-info h1{font-size:13px;font-weight:700;color:var(--text)}
.hdr-info p{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:6px}
/* Theme toggle */
.theme-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--ease)}
.theme-btn:hover{border-color:var(--accent)}
/* Change section */
.change-sec{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:9px;font-weight:700;padding:3px 8px;cursor:pointer;font-family:inherit;white-space:nowrap}
.change-sec:hover{border-color:var(--accent);color:var(--text)}
/* Section tabs */
.sec-row{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}
.sec-row::-webkit-scrollbar{display:none}
.stab{padding:7px 14px;border:none;border-radius:7px 7px 0 0;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:var(--ease)}
.stab.on{color:var(--text);background:var(--tab-active-bg);border-bottom-color:var(--accent)}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.venue{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 9px}
.venue b{color:#22c55e}
.vtabs{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px}
.vt{padding:5px 12px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:var(--ease)}
.vt.on{background:linear-gradient(135deg,var(--grad1),var(--grad2));color:#fff}

/* DAILY WRAP */
.dailywrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.daynav{padding:10px 14px 8px;display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg)}
.arr{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--ease)}
.arr:hover{border-color:var(--accent);color:var(--text)}
.dscroll{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.dscroll::-webkit-scrollbar{display:none}
.dbt{padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;text-align:center;min-width:44px;transition:var(--ease)}
.dbt .dn{display:block;font-size:9px;color:var(--muted);margin-bottom:1px}
.dbt.on{background:linear-gradient(135deg,var(--grad1),var(--grad2));border-color:transparent;color:#fff}
.dbt.on .dn{color:rgba(255,255,255,.7)}
.dbt.today-dot{position:relative}
.dbt.today-dot::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--me-ac)}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dcontent{padding:10px 14px 24px}

/* DATE HEADER */
.dhdr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dhdr .dname{font-size:15px;font-weight:800;color:var(--text)}
.dhdr .ddate{font-size:11px;color:var(--muted);margin-left:auto}
.sbadge{background:var(--fra-ac);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:auto;white-space:nowrap}

/* CLASS CARD */
.cards{display:flex;flex-direction:column;gap:10px}
.card{border-radius:14px;border:1px solid var(--border);overflow:hidden;position:relative}
[data-theme="dark"] .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--grad1),var(--grad2));opacity:0;transition:opacity .2s}
[data-theme="dark"] .card:hover::before{opacity:1}
[data-theme="light"] .card{box-shadow:0 1px 6px rgba(0,0,0,.06)}
.card-main{padding:12px;display:flex;gap:10px;cursor:pointer}
.ctm{flex-shrink:0;width:46px;text-align:center}
.ctm .t1{font-size:9px;color:var(--muted);font-weight:600;line-height:1.4}
.cdot{width:7px;height:7px;border-radius:50%;margin:5px auto 0}
.cbody{flex:1;min-width:0}
.cname{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.ccode{font-size:9px;color:var(--muted);margin-bottom:7px;font-family:monospace}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.spill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:5px;border:1px solid;white-space:nowrap}

/* EXPAND BTN */
.expand-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px 12px;border:none;border-top:1px solid var(--border);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;background:transparent;transition:var(--ease)}
.expand-btn .arrow{display:inline-block;transition:transform .25s;font-size:11px}
.expand-btn.open .arrow{transform:rotate(180deg)}

/* PRE-READS PANEL — OPTION 5 STYLE */
.prereads{overflow:hidden;max-height:0;transition:max-height .3s ease}
.prereads.open{max-height:600px}
.prereads-inner{border-top:1px solid var(--border)}
.pr-top{padding:10px 12px 8px}
.pr-top .pr-theme{font-size:12px;font-weight:800;color:var(--text);margin-bottom:2px}
.pr-top .pr-topics{font-size:10px;color:var(--muted);line-height:1.5}
.pr-body{padding:8px 12px 12px}
.pr-section-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;margin-top:10px;display:flex;align-items:center;gap:5px}
.pr-section-lbl:first-child{margin-top:0}
.pr-section-lbl::after{content:"";flex:1;height:1px;background:var(--border)}
.pr-item-card{border-radius:8px;padding:8px 10px;margin-bottom:5px;border-left:3px solid;display:flex;gap:8px;align-items:flex-start}
.pr-item-card .pr-icon{font-size:11px;flex-shrink:0;margin-top:1px}
.pr-item-card .pr-txt{font-size:11px;line-height:1.4;font-weight:500}
.pr-ref-row{display:flex;gap:6px;align-items:baseline;padding:3px 0}
.pr-ref-arr{font-size:11px}
.pr-ref-txt{font-size:10px;color:var(--muted);line-height:1.4}
.pr-empty{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:8px;border:1px dashed var(--border)}
.pr-empty span{font-size:11px;color:var(--muted)}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:32px;margin-bottom:8px}
.empty p{font-size:12px}

/* WEEKLY */
.weeklywrap{display:none;flex:1;overflow:hidden;flex-direction:column}
.wleg{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px 6px;flex-shrink:0}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.ld{width:7px;height:7px;border-radius:2px}
.wwrap{overflow-x:auto;padding:0 14px 20px}
.wtbl{border-collapse:collapse;min-width:420px;width:100%}
.wtbl th{background:var(--surface);padding:6px 4px;font-size:9px;font-weight:700;color:var(--muted);border:1px solid var(--border);text-align:center}
.wtbl td{border:1px solid var(--border);padding:4px;vertical-align:top;background:var(--bg);min-width:60px}
.wtbl .dl{font-size:9px;font-weight:700;color:var(--text);background:var(--surface);text-align:center;white-space:nowrap}
.gp{border-radius:4px;padding:2px 5px;font-size:8px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;display:block}
.gp.sp{background:rgba(247,86,124,.15);color:var(--fra-ac);border-color:rgba(247,86,124,.25)}
.gsn{font-size:7px;opacity:.6}

/* ONBOARDING */
.onboard{position:fixed;inset:0;background:var(--ob-bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;max-width:600px;margin:0 auto}
.ob-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--grad1),var(--grad2));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin-bottom:20px;box-shadow:0 8px 32px rgba(109,40,217,.3)}
.ob-title{font-size:22px;font-weight:800;color:var(--text);text-align:center;margin-bottom:6px}
.ob-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:36px;line-height:1.5}
.ob-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;align-self:flex-start;width:100%}
.ob-sections{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:32px}
.ob-sec{padding:16px 8px;border:1px solid var(--ob-border);border-radius:12px;background:var(--ob-card);color:var(--muted);font-size:15px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;transition:var(--ease)}
.ob-sec:hover{border-color:var(--accent);color:var(--text)}
.ob-sec.picked{background:var(--tag-bg);border-color:var(--accent);color:var(--text)}
.ob-sec .ob-venue{display:block;font-size:9px;color:var(--muted);font-weight:500;margin-top:4px}
.ob-sec.picked .ob-venue{color:var(--accent)}
.ob-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--grad1),var(--grad2));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(109,40,217,.3)}
.ob-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.ob-footer{font-size:10px;color:var(--submuted);margin-top:16px;text-align:center}

/* INSTALL BANNER */
.install-bar{background:var(--install-bg);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.install-bar p{font-size:11px;color:var(--muted);flex:1;line-height:1.4}
.ibtn{background:linear-gradient(135deg,var(--grad1),var(--grad2));color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.iclose{color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;background:none;border:none}
</style>
</head>

  if (!PREREADS[courseKey]) return null;
  return PREREADS[courseKey][sessionNum] || null;
}

// ── COURSE CONFIG ──────────────────────────────────────────────
const SEC={A:{v:'CR 003'},B:{v:'CR 004'},C:{v:'CR 102'},D:{v:'CR 103'},E:{v:'CR 113'},F:{v:'CR 114'}};
const CNAME={BS:'Business Statistics',FRA:'Financial Reporting & Analysis',ME:'Managerial Economics',MC:'Managerial Communication','MM-I':'Marketing Management I',MIOB:'Micro Organisational Behaviour'};

// CSS var names per course (for theming)
const CVAR={BS:'bs',FRA:'fra',ME:'me',MC:'mc','MM-I':'mmi',MIOB:'miob'};

const FAC={
  'BS[VCT]':'Prof. Vinu C T','BS[SUSH]':'Prof. Shubhendu Singh','BS[MMS]':'Prof. M. M. Siddartha','BS[SMG]':'Prof. S. M. Govindaluri',
  'FRA[NG]':'Prof. Naresh G','FRA[SMA]':'Prof. Suhas M Avabruth','FRA[DM]':'Prof. Dharani M',
  'ME[VM]':'Prof. Varun Mahajan','ME[VB]':'Prof. Vasavi Bhatt','ME[MS]':'Prof. Madhuri Saripalle',
  'MC[RRB]':'Prof. Rashmi R Behera','MC[SS]':'Prof. Shameem','MC[TS]':'Prof. Tulika Sharma',
  'MM-I[AS]':'Prof. Anirban Som','MM-I[AJS]':'Prof. Ajitha S','MM-I[RPS]':'Prof. R. P. Singh',
  'MM-I[PKT]':'Prof. P. K. Teja','MM-I[SMS]':'Prof. Satish S M',
  'MIOB[PN]':'Prof. Papri Nath','MIOB[VV]':'Prof. Vijaya V','MIOB[AKT]':'Prof. A. K. Totawar'
};
const TIMES=['08:30–10:00','10:30–12:00','12:15–13:45','14:45–16:15','16:30–18:00','18:15–19:45'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYSFULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SPECIALS=['Mid-Term','End-Term','AOL WORKSHOP','Independence Day','DAKSHA'];
const SICONS={'Mid-Term':'📋','End-Term':'📝','AOL WORKSHOP':'🧘','Independence Day':'🇮🇳','DAKSHA':'🎓'};

// Build DB
const DB={};const _seen=new Set();const ALL_DATES=[];
SCHED.forEach(([ds,sec,slots])=>{if(!DB[ds])DB[ds]={};DB[ds][sec]=slots;if(!_seen.has(ds)){_seen.add(ds);ALL_DATES.push(ds);}});
ALL_DATES.sort((a,b)=>pdate(a)-pdate(b));
// Remove Sundays that have no real classes (only specials or empty)
const _filtered = ALL_DATES.filter(ds => {
  const d = pdate(ds);
  if (d.getDay() !== 0) return true; // keep non-Sundays
  // For Sundays, only keep if they have actual class slots (not just specials)
  const allSecs = Object.values(DB[ds] || {});
  for (const slots of allSecs) {
    for (const s of slots) {
      if (s && !['Mid-Term','End-Term','AOL WORKSHOP','Independence Day','DAKSHA'].some(x=>s.includes(x))) {
        return true; // has real class
      }
    }
  }
  return false; // Sunday with only specials or empty — remove
});
ALL_DATES.length = 0;
_filtered.forEach(d => ALL_DATES.push(d));

// Build SESSION_MAP
const SESSION_MAP={};
SESSION_MAP_RAW.forEach(([ds,sec,idx,snum])=>{SESSION_MAP[ds+'|'+sec+'|'+idx]=snum;});

function pdate(ds){const[d,m,y]=ds.split('-');return new Date(+y,+m-1,+d);}
function fmtDate(ds){return pdate(ds).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function dayOf(ds){return DAYS[pdate(ds).getDay()];}
function dayFullOf(ds){return DAYSFULL[pdate(ds).getDay()];}
function getCK(s){if(!s)return null;for(const k of Object.keys(CVAR))if(s.startsWith(k))return k;return null;}
function isSp(s){return s&&SPECIALS.some(x=>s.includes(x));}
function getSession(ds,sec,idx){return SESSION_MAP[ds+'|'+sec+'|'+idx]||null;}

// Helper: get CSS var value for course
function cv(ck,type){
  const v=CVAR[ck];
  return v?`var(--${v}-${type})`:'var(--border)';
}

// STATE
let curSec='A',curView='d',curIdx=0;

// Today date string
const todayStr=(()=>{const t=new Date();return `${String(t.getDate()).padStart(2,'0')}-${String(t.getMonth()+1).padStart(2,'0')}-${t.getFullYear()}`})();

// Find nearest date
(()=>{const today=new Date();today.setHours(0,0,0,0);let best=0,bestD=Infinity;ALL_DATES.forEach((ds,i)=>{const diff=Math.abs(pdate(ds)-today);if(diff<bestD){bestD=diff;best=i;}});curIdx=best;})();

// ── THEME ──────────────────────────────────────────────────────
function initTheme(){
  const saved=localStorage.getItem('pgpm_theme')||'dark';
  setTheme(saved,false);
}
function toggleTheme(){
  const current=document.documentElement.getAttribute('data-theme');
  const next=current==='dark'?'light':'dark';
  gtag('event','theme_toggled',{theme:next});
  setTheme(next,true);
}
function setTheme(t,save){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
  document.querySelector('meta[name="theme-color"]').content=t==='dark'?'#09090b':'#f5f5f7';
  if(save)localStorage.setItem('pgpm_theme',t);
}

// ── ONBOARDING ─────────────────────────────────────────────────
let obPicked=null;
function buildOnboard(){
  const c=document.getElementById('obSections');
  Object.entries(SEC).forEach(([s,info])=>{
    const b=document.createElement('button');
    b.className='ob-sec';
    b.innerHTML=`Section ${s}<span class="ob-venue">${info.v}</span>`;
    b.onclick=()=>{obPicked=s;document.querySelectorAll('.ob-sec').forEach(x=>x.classList.remove('picked'));b.classList.add('picked');document.getElementById('obBtn').disabled=false;};
    c.appendChild(b);
  });
}
function confirmSection(){
  if(!obPicked)return;
  localStorage.setItem('pgpm_section',obPicked);
  curSec=obPicked;
  hideOnboard();
}
function showOnboard(isChange=false){
  obPicked=null;document.getElementById('obBtn').disabled=true;
  document.querySelectorAll('.ob-sec').forEach(x=>x.classList.remove('picked'));
  if(isChange){document.querySelector('.ob-title').textContent='Change Section';document.querySelector('.ob-sub').textContent='Pick a different section to switch your view';}
  document.getElementById('onboard').style.display='flex';
}
function hideOnboard(){
  document.getElementById('onboard').style.display='none';
  const row=document.getElementById('secRow');row.innerHTML='';
  Object.keys(SEC).forEach(s=>{const b=document.createElement('button');b.className='stab'+(s===curSec?' on':'');b.textContent='Section '+s;b.onclick=()=>pickSec(s);row.appendChild(b);});
  render();
}

// ── INIT ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  initTheme();
  buildOnboard();
  const saved=localStorage.getItem('pgpm_section');
  if(saved&&SEC[saved]){curSec=saved;document.getElementById('onboard').style.display='none';}
  else{document.getElementById('onboard').style.display='flex';}
  const row=document.getElementById('secRow');
  Object.keys(SEC).forEach(s=>{const b=document.createElement('button');b.className='stab'+(s===curSec?' on':'');b.textContent='Section '+s;b.onclick=()=>pickSec(s);row.appendChild(b);});
  buildDayBtns();
  const leg=document.getElementById('wleg');
  Object.entries(CVAR).forEach(([k,v])=>{leg.innerHTML+=`<div class="li"><div class="ld" style="background:var(--${v}-ac)"></div>${CNAME[k]||k}</div>`;});
  render();
  setupInstall();
});

function pickSec(s){
  curSec=s;
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('on',Object.keys(SEC)[i]===s));
  gtag('event','section_selected',{section:s});
  render();
}
function setView(v){
  curView=v;
  gtag('event','view_switched',{view:v==='d'?'daily':'weekly'});
  document.getElementById('dailyWrap').style.display=v==='d'?'flex':'none';
  document.getElementById('weeklyWrap').style.display=v==='w'?'flex':'none';
  document.getElementById('weeklyWrap').style.flexDirection=v==='w'?'column':'';
  document.getElementById('vtD').classList.toggle('on',v==='d');
  document.getElementById('vtW').classList.toggle('on',v==='w');
  render();
}
function shift(d){curIdx=Math.max(0,Math.min(ALL_DATES.length-1,curIdx+d));render();}

function buildDayBtns(){
  const sc=document.getElementById('dscroll');sc.innerHTML='';
  ALL_DATES.forEach((ds,i)=>{
    const d=pdate(ds);
    const b=document.createElement('button');
    b.className='dbt'+(ds===todayStr?' today-dot':'');
    b.innerHTML=`<span class="dn">${DAYS[d.getDay()]}</span>${d.getDate()} ${d.toLocaleString('en',{month:'short'})}`;
    b.onclick=()=>{curIdx=i;render();};
    sc.appendChild(b);
  });
}
function syncDayBtns(){
  document.querySelectorAll('.dbt').forEach((b,i)=>b.classList.toggle('on',i===curIdx));
  const sc=document.getElementById('dscroll');
  const ab=sc.children[curIdx];
  if(ab)ab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function render(){
  document.getElementById('venTxt').textContent=SEC[curSec].v;
  if(curView==='d'){renderDaily();syncDayBtns();}else renderWeekly();
}

function toggleExpand(id){
  const pr=document.getElementById('pr-'+id);
  const btn=document.getElementById('eb-'+id);
  if(!pr||!btn)return;
  const open=pr.classList.contains('open');
  pr.classList.toggle('open',!open);
  btn.classList.toggle('open',!open);
  if(!open) gtag('event','prereads_opened',{card_id:id,section:curSec});
}

function buildPrereadsHTML(ck,snum,acVar,bgVar,brVar){
  const data=getPrereads(ck,snum);
  let h=`<div class="pr-top" style="background:${bgVar};border-bottom:1px solid ${brVar}">`;
  if(data){
    h+=`<div class="pr-theme">${data.theme}</div>`;
    if(data.topics)h+=`<div class="pr-topics">${data.topics}</div>`;
  } else {
    h+=`<div class="pr-theme">Session ${snum||'–'}</div>`;
  }
  h+=`</div><div class="pr-body">`;
  if(!data){
    h+=`<div class="pr-empty"><span>📚 Pre-reads will be added soon</span></div>`;
  } else {
    if(data.prereads&&data.prereads.length){
      h+=`<div class="pr-section-lbl" style="color:${acVar}">📚 Pre-Reads</div>`;
      data.prereads.forEach(pr=>{
        const isAct=pr.toLowerCase().includes('activity')||pr.toLowerCase().includes('no pre-reads')||pr.toLowerCase().includes('guest lecture');
        h+=`<div class="pr-item-card" style="background:${bgVar};border-left-color:${acVar};border:1px solid ${brVar};border-left:3px solid ${acVar}">
          <div class="pr-icon">${isAct?'✏️':'📄'}</div>
          <div class="pr-txt" style="color:var(--text)">${pr}</div>
        </div>`;
      });
    }
    if(data.refs&&data.refs.length){
      h+=`<div class="pr-section-lbl" style="color:${acVar}">📗 References</div>`;
      data.refs.forEach(r=>{
        h+=`<div class="pr-ref-row"><div class="pr-ref-arr" style="color:${acVar}">›</div><div class="pr-ref-txt">${r}</div></div>`;
      });
    }
  }
  h+=`</div>`;
  return h;
}

function renderDaily(){
  const ds=ALL_DATES[curIdx];
  const slots=(DB[ds]&&DB[ds][curSec])||[];
  const spVal=slots.find(s=>s&&isSp(s));
  const spKey=spVal?Object.keys(SICONS).find(k=>spVal.includes(k)):null;

  let h=`<div class="dhdr"><div class="dname">${dayFullOf(ds)}</div><div class="ddate">${fmtDate(ds)}</div>${spVal?`<div class="sbadge">${spVal}</div>`:''}</div>`;

  if(spVal){
    h+=`<div class="empty"><div class="ei">${SICONS[spKey]||'📅'}</div><p>${spVal}</p></div>`;
    document.getElementById('dcontent').innerHTML=h;return;
  }

  const cls=slots.map((s,i)=>({s,i})).filter(x=>x.s&&!isSp(x.s));
  if(!cls.length){
    h+=`<div class="empty"><div class="ei">☀️</div><p>No classes today</p></div>`;
  } else {
    h+='<div class="cards">';
    cls.forEach(({s,i})=>{
      const ck=getCK(s);
      const v=ck?CVAR[ck]:null;
      const ac=v?`var(--${v}-ac)`:'var(--muted)';
      const bg=v?`var(--${v}-bg)`:'var(--surface)';
      const br=v?`var(--${v}-br)`:'var(--border)';
      const name=ck?CNAME[ck]:s;
      const fac=FAC[s]||'';
      const t=TIMES[i];
      const[t1,t2]=t.split('–');
      const snum=getSession(ds,curSec,i);
      const id=ds.replace(/-/g,'')+'_'+curSec+'_'+i;

      h+=`<div class="card" style="background:${bg};border-color:${br}">
        <div class="card-main" onclick="toggleExpand('${id}')">
          <div class="ctm">
            <div class="t1">${t1}</div><div class="t1">–${t2}</div>
            <div class="cdot" style="background:${ac}"></div>
          </div>
          <div class="cbody">
            <div class="cname">${name}</div>
            <div class="ccode">[${s}]</div>
            <div class="pills">
              ${snum?`<div class="spill" style="color:${ac};border-color:${br};background:${bg}">Session ${snum}</div>`:''}
              ${fac?`<div class="pill">👨‍🏫 ${fac}</div>`:''}
              <div class="pill">📍 ${SEC[curSec].v}</div>
              <div class="pill">🕐 ${t}</div>
            </div>
          </div>
        </div>
        <button class="expand-btn" id="eb-${id}" onclick="toggleExpand('${id}')" style="color:${ac};border-top-color:${br}">
          <span>📖 Pre-reads & References</span><span class="arrow">▼</span>
        </button>
        <div class="prereads" id="pr-${id}">
          <div class="prereads-inner">${buildPrereadsHTML(ck,snum,ac,bg,br)}</div>
        </div>
      </div>`;
    });
    h+='</div>';
  }
  document.getElementById('dcontent').innerHTML=h;
  document.getElementById('dailyScroll').scrollTop=0;
}

function renderWeekly(){
  const labs=['8:30','10:30','12:15','14:45','16:30','18:15'];
  let h=`<thead><tr><th>Date</th>${labs.map(t=>`<th>${t}</th>`).join('')}</tr></thead><tbody>`;
  ALL_DATES.forEach(ds=>{
    const slots=(DB[ds]&&DB[ds][curSec])||[];
    const d=pdate(ds);
    const isToday=ds===todayStr;
    const lbl=`${DAYS[d.getDay()]}<br>${d.getDate()}/${d.getMonth()+1}`;
    h+=`<tr><td class="dl" style="${isToday?'color:var(--accent);font-weight:800':''}">${lbl}${isToday?' 🔵':''}</td>`;
    for(let i=0;i<6;i++){
      const s=slots[i];
      if(!s){h+='<td></td>';continue;}
      if(isSp(s)){const sh=s.replace(' WORKSHOP','').replace('Independence Day','🇮🇳');h+=`<td><span class="gp sp">${sh}</span></td>`;continue;}
      const ck=getCK(s);const v=ck?CVAR[ck]:null;
      const st=v?`background:var(--${v}-bg);color:var(--${v}-ac);border-color:var(--${v}-br)`:'color:var(--muted)';
      const snum=getSession(ds,curSec,i);
      h+=`<td><span class="gp" style="${st}">${s.split('[')[0]}${snum?`<span class="gsn"> S${snum}</span>`:''}</span></td>`;
    }
    h+='</tr>';
  });
  h+='</tbody>';
  document.getElementById('wtbl').innerHTML=h;
}

// PWA INSTALL
let deferredPrompt=null;
function setupInstall(){
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBar').style.display='flex';});
  document.getElementById('installBtn').addEventListener('click',async()=>{
    if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('installBar').style.display='none';}
    else{alert('To install on iPhone: tap Share → "Add to Home Screen"');}
  });
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches;
  if(isIOS&&!isStandalone){document.getElementById('installBar').style.display='flex';document.getElementById('installBtn').textContent='How?';document.querySelector('#installBar p').innerHTML='📲 Tap Share → "Add to Home Screen" to install';}
}

// SERVICE WORKER
if('serviceWorker' in navigator){
  const sw=`const C='pgpm-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([location.pathname])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(location.pathname))));});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
